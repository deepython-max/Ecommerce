<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg, #ff7b00, #ffb347);
            font-family:Arial, Helvetica, sans-serif;
        }

        .thankyou-box{
            background:white;
            padding:50px 40px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
            text-align:center;
            max-width:500px;
            width:90%;
            animation:fadeIn 1s ease-in-out;
        }

        .thankyou-box h1{
            color:#ff6a00;
            font-size:38px;
            margin-bottom:15px;
        }

        .thankyou-box p{
            color:#555;
            font-size:18px;
            margin-bottom:30px;
        }

        .btn-home{
            text-decoration:none;
        }

        .btn-home button{
            background:#ff6a00;
            color:white;
            border:none;
            padding:14px 35px;
            font-size:18px;
            border-radius:50px;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(255,106,0,0.3);
        }

        .btn-home button:hover{
            background:#e65c00;
            transform:translateY(-3px);
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(40px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="thankyou-box">
        <h1>Thank You {{ name }}! 🎉</h1>
        <p>Your message has been submitted successfully.</p>

        <a href="{% url 'home' %}" class="btn-home">
            <button>Go Home</button>
        </a>
    </div>

</body>
</html>
