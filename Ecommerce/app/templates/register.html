<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title|default:"Register" }}</title>

    <style>
        :root {
            --primary: #ff7e00;
            --secondary: #ffb347;
            --btn: #ff6a00;
            --btn-hover: #e65c00;
            --text-accent: #ffd9b3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 360px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #fff3e6;
        }

        input {
            width: 100%;
            margin-top: 12px;
            padding: 11px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            box-shadow: 0 0 6px #ffd9b3;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--btn);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--btn-hover);
            transform: scale(1.04);
        }

        .alert {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 14px;
        }

        .alert-success {
            background: rgba(255, 200, 100, 0.25);
        }

        .alert-error {
            background: rgba(255, 80, 0, 0.25);
        }

        .footer-text {
            margin-top: 15px;
            text-align: center;
            font-size: 13px;
        }

        .footer-text a {
            color: var(--text-accent);
            text-decoration: none;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>{{ heading|default:"Create Account" }}</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="👤 Name" required>

        <input type="tel" name="mobile" placeholder="📱 Mobile Number" required>

        <input type="email" name="email" placeholder="📧 Email" required>

        <input type="password" name="password" placeholder="🔒 Password" required>

        <button type="submit">🚀 {{ button_text|default:"Register" }}</button>
    </form>

    <div class="footer-text">
        Already have an account? 
        <a href="{% url 'login' %}">Login</a>
    </div>

</div>

</body>
</html>
